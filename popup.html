<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mod Headers</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <h1>Mod Headers</h1>
  <div class="header-wrapper">
    <span class="header-title header-title-first">1</span>
    <input type="checkbox" id="headerCheckbox1" aria-label="Enable header 1" />
    <div class="param-container">
      <input type="text" id="paramHeader-1" placeholder="X-Header-Name" class="paramInput" aria-label="Header name 1" />
      <input type="text" id="paramValue-1" placeholder="value" class="paramInput param-value" aria-label="Header value 1" />
      <button class="param-action param-action-url" id="paramCopyWithUrl-1"
        title="Copy this tab's URL with the header added as a query param"
        aria-label="Copy tab URL with header 1 as query param"><svg class="icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 9.5a2.5 2.5 0 0 0 3.54 0l2.5-2.5a2.5 2.5 0 0 0-3.54-3.54l-.9.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9.5 6.5a2.5 2.5 0 0 0-3.54 0l-2.5 2.5a2.5 2.5 0 0 0 3.54 3.54l.9-.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div class="header-wrapper">
    <span class="header-title">2</span>
    <input type="checkbox" id="headerCheckbox2" aria-label="Enable header 2" />
    <div class="param-container">
      <input type="text" id="paramHeader-2" placeholder="X-Header-Name" class="paramInput" aria-label="Header name 2" />
      <input type="text" id="paramValue-2" placeholder="value" class="paramInput param-value" aria-label="Header value 2" />
      <button class="param-action param-action-url" id="paramCopyWithUrl-2"
        title="Copy this tab's URL with the header added as a query param"
        aria-label="Copy tab URL with header 2 as query param"><svg class="icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 9.5a2.5 2.5 0 0 0 3.54 0l2.5-2.5a2.5 2.5 0 0 0-3.54-3.54l-.9.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9.5 6.5a2.5 2.5 0 0 0-3.54 0l-2.5 2.5a2.5 2.5 0 0 0 3.54 3.54l.9-.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div class="header-wrapper">
    <span class="header-title">3</span>
    <input type="checkbox" id="headerCheckbox3" aria-label="Enable header 3" />
    <div class="param-container">
      <input type="text" id="paramHeader-3" placeholder="X-Header-Name" class="paramInput" aria-label="Header name 3" />
      <input type="text" id="paramValue-3" placeholder="value" class="paramInput param-value" aria-label="Header value 3" />
      <button class="param-action param-action-url" id="paramCopyWithUrl-3"
        title="Copy this tab's URL with the header added as a query param"
        aria-label="Copy tab URL with header 3 as query param"><svg class="icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 9.5a2.5 2.5 0 0 0 3.54 0l2.5-2.5a2.5 2.5 0 0 0-3.54-3.54l-.9.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9.5 6.5a2.5 2.5 0 0 0-3.54 0l-2.5 2.5a2.5 2.5 0 0 0 3.54 3.54l.9-.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div class="header-wrapper">
    <span class="header-title">4</span>
    <input type="checkbox" id="headerCheckbox4" aria-label="Enable header 4" />
    <div class="param-container">
      <input type="text" id="paramHeader-4" placeholder="X-Header-Name" class="paramInput" aria-label="Header name 4" />
      <input type="text" id="paramValue-4" placeholder="value" class="paramInput param-value" aria-label="Header value 4" />
      <button class="param-action param-action-url" id="paramCopyWithUrl-4"
        title="Copy this tab's URL with the header added as a query param"
        aria-label="Copy tab URL with header 4 as query param"><svg class="icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 9.5a2.5 2.5 0 0 0 3.54 0l2.5-2.5a2.5 2.5 0 0 0-3.54-3.54l-.9.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9.5 6.5a2.5 2.5 0 0 0-3.54 0l-2.5 2.5a2.5 2.5 0 0 0 3.54 3.54l.9-.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div class="header-wrapper">
    <span class="header-title">5</span>
    <input type="checkbox" id="headerCheckbox5" aria-label="Enable header 5" />
    <div class="param-container">
      <input type="text" id="paramHeader-5" placeholder="X-Header-Name" class="paramInput" aria-label="Header name 5" />
      <input type="text" id="paramValue-5" placeholder="value" class="paramInput param-value" aria-label="Header value 5" />
      <button class="param-action param-action-url" id="paramCopyWithUrl-5"
        title="Copy this tab's URL with the header added as a query param"
        aria-label="Copy tab URL with header 5 as query param"><svg class="icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 9.5a2.5 2.5 0 0 0 3.54 0l2.5-2.5a2.5 2.5 0 0 0-3.54-3.54l-.9.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9.5 6.5a2.5 2.5 0 0 0-3.54 0l-2.5 2.5a2.5 2.5 0 0 0 3.54 3.54l.9-.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div class="header-wrapper">
    <span class="header-title">6</span>
    <input type="checkbox" id="headerCheckbox6" aria-label="Enable header 6" />

    <div class="param-container">
      <input type="text" id="paramHeader-6" placeholder="X-Header-Name" class="paramInput" aria-label="Header name 6" />
      <input type="text" id="paramValue-6" placeholder="value" class="paramInput param-value" aria-label="Header value 6" />
      <button class="param-action param-action-url" id="paramCopyWithUrl-6"
        title="Copy this tab's URL with the header added as a query param"
        aria-label="Copy tab URL with header 6 as query param"><svg class="icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 9.5a2.5 2.5 0 0 0 3.54 0l2.5-2.5a2.5 2.5 0 0 0-3.54-3.54l-.9.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9.5 6.5a2.5 2.5 0 0 0-3.54 0l-2.5 2.5a2.5 2.5 0 0 0 3.54 3.54l.9-.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <footer class="legend">
    <div class="legend-servo">
      <button class="param-action param-action-servo servo-open" id="servoOpen"
        title="Open this tab's PR stack in Servo (reads pr-<number> from the URL)">Open on Servo</button>
      <span>Reads <code>pr-&lt;number&gt;</code> from the page URL</span>
    </div>
    <dl class="legend-keys">
      <dt class="legend-key"><svg class="icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M6.5 9.5a2.5 2.5 0 0 0 3.54 0l2.5-2.5a2.5 2.5 0 0 0-3.54-3.54l-.9.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9.5 6.5a2.5 2.5 0 0 0-3.54 0l-2.5 2.5a2.5 2.5 0 0 0 3.54 3.54l.9-.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></dt>
      <dd>Copy this tab's URL with the header added as a query param</dd>
    </dl>
    <p class="legend-shortcuts">
      <kbd>1</kbd>–<kbd>6</kbd> toggle a row · <kbd>Ctrl</kbd>+<kbd>1</kbd>–<kbd>6</kbd> select the header name ·
      <kbd>Shift</kbd>+<kbd>1</kbd>–<kbd>6</kbd> select the value · <kbd>Esc</kbd> leave a field
    </p>
  </footer>

  <script src="/dist/popup.js" defer></script>
</body>

</html>
